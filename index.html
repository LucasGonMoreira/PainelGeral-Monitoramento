            <div id="cities-grid" class="drilldown-grid"></div>
        </div>
    </div>

    <!-- View 3: Towers View -->
    <div id="towers-view" class="view-container">
        <header class="map-header glass-panel">
            <button class="btn-back" id="btn-back-cities">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Voltar as Cidades
            </button>
            <div class="map-title" id="towers-view-title">POPs / Torres</div>
        </header>
        <div class="drilldown-container">
            <div id="towers-grid" class="drilldown-grid"></div>
        </div>
    </div>

    <!-- View 3: Equipments View -->
    <div id="equipments-view" class="view-container">
        <header class="map-header glass-panel">
            <button class="btn-back" id="btn-back-towers">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Voltar aos POPs/Torres
            </button>
            <div class="map-title" id="equipments-view-title">Equipamentos</div>
        </header>
        <div class="drilldown-container">
            <div id="equipments-grid" class="drilldown-grid"></div>
        </div>
    </div>

    <!-- View 4: Alerts View -->
    <div id="alerts-view" class="view-container">
        <header class="map-header glass-panel">
            <button class="btn-back" id="btn-back-equipments">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Voltar
            </button>
            <div class="map-title" id="alerts-view-title">Alertas Atuais</div>
        </header>
        <div class="drilldown-container">
            <div id="alerts-grid" class="drilldown-grid"></div>
            <div id="server-stats-container" style="display: flex; justify-content: center; margin-top: 30px; width: 100%;"></div>
        </div>
    </div>

    <!-- Modal para ComentÃ¡rios -->
    <div id="comment-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content glass-panel" style="padding: 20px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center; background: rgba(30,30,40,0.9); border: 1px solid rgba(255, 255, 255, 0.1);">
            <h3 style="margin-top: 0; color: #fff;">Comentário</h3>
            <p id="comment-text" style="color: #ccc; margin: 20px 0; font-size: 1rem; line-height: 1.5;"></p>
            <button id="close-comment-btn" style="background: #3a3a4c; color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: background 0.3s;">Fechar</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./main.js?v=2"></script>

</body>

</html>
